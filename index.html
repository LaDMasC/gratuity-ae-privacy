<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gratuity AE</title>
    <meta name="description" content="Privacy policy and support information for Gratuity AE.">
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f0e5;
        --ink: #172120;
        --muted: #5f6967;
        --accent: #176257;
        --card: #fffaf1;
        --line: #e2d9cc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(720px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      .mark {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: var(--accent);
        color: var(--card);
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 24px;
      }

      h1 {
        margin: 28px 0 12px;
        font-size: clamp(36px, 8vw, 56px);
        line-height: 1.05;
      }

      p {
        color: var(--muted);
        font-size: 18px;
        margin: 0 0 28px;
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }

      .card {
        margin-top: 40px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">AE</div>
      <h1>Gratuity AE</h1>
      <p>Local-first UAE end-of-service gratuity estimation utility.</p>
      <section class="card">
        <h2>Privacy</h2>
        <p>
          Read the Gratuity AE privacy policy:
          <a href="./privacy.html">Privacy Policy</a>.
        </p>
        <p>Support: <a href="mailto:support@uaegratuity.app">support@uaegratuity.app</a></p>
      </section>
    </main>
  </body>
</html>
